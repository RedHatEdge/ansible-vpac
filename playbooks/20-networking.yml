---
# Networking: bonds, bridges, VLANs via nmstate. Verifies PTP NIC isolation
# (defends against a documented field regression where PTP ran on a NIC that
# was also a macvtap target for guest VMs, and guests stole the PTP frames).

- name: Networking
  hosts: vpac_cluster
  gather_facts: true
  roles:
    - role: networking
    - role: ptp_isolation
      when: (networking_defaults.ptp_nic | default('')) | length > 0
