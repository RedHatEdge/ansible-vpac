---
# Basic chrony sync — the foundation Ceph (and Pacemaker, and every other
# distributed thing here) depends on. Runs against ntp_servers from
# inventory. Stage 40 (ptp_timesync) may later replace these with PTP.

- name: "Write chrony.conf"
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: "restart chronyd"

- name: "Enable + start chronyd"
  ansible.builtin.systemd_service:
    name: chronyd
    state: started
    enabled: true

- name: "Apply any pending chrony config change before waitsync"
  ansible.builtin.meta: flush_handlers

- name: "Wait for chrony to synchronize"
  # chronyc waitsync <max-tries> <max-correction-sec> <max-skew-ppm> <interval-sec>
  # Poll interval is 10s; total wait is (sync_timeout_s / 10) tries.
  ansible.builtin.command: >-
    /usr/bin/chronyc waitsync
    {{ (time_sync.sync_timeout_s | int) // 10 }}
    {{ (time_sync.max_offset_ms | int) / 1000.0 }}
    0.0
    10
  changed_when: false
  register: _chrony_waitsync

- name: "Report chrony tracking state"
  ansible.builtin.command: /usr/bin/chronyc tracking
  changed_when: false
  register: _chrony_tracking

- name: "Show chrony tracking summary"
  ansible.builtin.debug:
    msg: "{{ _chrony_tracking.stdout_lines | select('match', '^(Reference ID|Stratum|System time|Leap status)') | list }}"
