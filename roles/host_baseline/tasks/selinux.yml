---
# Set SELinux to the configured mode persistently. Default is permissive
# because qemu-kvm under enforcing cannot read /etc/ceph/ceph.conf without
# context tweaks, and every RBD-backed VM dies on start. The kernel cmdline
# `selinux=0` is the WRONG fix — it removes /sys/fs/selinux entirely and
# breaks Ceph OSD containers. The correct knob is /etc/selinux/config plus
# setenforce. Sites that have proven SELinux contexts can override
# selinux_target_mode to "enforcing".

- name: "Read kernel cmdline"
  ansible.builtin.slurp:
    src: /proc/cmdline
  register: _baseline_cmdline

- name: "Reject selinux=0 on kernel cmdline (breaks Ceph OSD containers)"
  ansible.builtin.assert:
    that: "'selinux=0' not in (_baseline_cmdline.content | b64decode)"
    fail_msg: >-
      Kernel cmdline contains 'selinux=0', which removes /sys/fs/selinux and
      breaks Ceph OSD containers. Remove it from grubby and reboot before
      re-running. The correct knob is /etc/selinux/config — set
      SELINUX={{ selinux_target_mode }} and let this role handle it.

- name: "Set SELinux mode persistently"
  ansible.posix.selinux:
    policy: targeted
    state: "{{ selinux_target_mode }}"
  register: _baseline_selinux_set

- name: "Read live SELinux state"
  ansible.builtin.command: /usr/sbin/getenforce
  register: _baseline_selinux
  changed_when: false

- name: "Assert live SELinux state matches target"
  ansible.builtin.assert:
    that: _baseline_selinux.stdout | lower == selinux_target_mode | lower
    fail_msg: >-
      Live SELinux state is {{ _baseline_selinux.stdout }} but target is
      {{ selinux_target_mode }}. If transitioning from Disabled, a reboot
      is required to load the policy. Reboot the node and re-run baseline.
