---
# Minimal package set host_baseline installs BEFORE its own later tasks
# (chrony.yml, firewalld.yml, selinux.yml) run. The full operator
# tooling set — vim, tmux, htop, sos, audit, cloud-init, podman, Cockpit,
# etc. — is installed afterwards by the common_tools role, which
# host_baseline includes as its final step.
#
# Keep this list small. Anything an SA expects on a shell goes in
# common_tools, not here — that way the same set lands on the builder
# too (which doesn't run host_baseline).
baseline_packages:
  - chrony                          # used by chrony.yml below
  - firewalld                       # used by firewalld.yml below
  - openssh-server                  # ensure the admin can keep reaching us
  - policycoreutils-python-utils    # used by selinux.yml

baseline_extra_packages: []

# Journald sizing. 2 GiB is a reasonable default for cluster nodes;
# bump for sites that want longer retention.
journald_max_use_mb: 2048

# Local mirror GPG handling. Lab default is off. Prod sites should
# set local_mirror_gpgcheck: true and provide the key URL.
local_mirror_gpgcheck: false
local_mirror_gpgkey_url: ""

# Firewalld zone used by default. Other roles add services to this zone.
firewalld_default_zone: "public"

# Skip the repo-source setup entirely. Useful for lab runs where the VMs were
# installed from a DVD ISO and already have packages baked in, and you don't
# have an RHSM activation key / Satellite / local mirror. Production deploys
# always leave this false.
host_baseline_skip_repo: false
