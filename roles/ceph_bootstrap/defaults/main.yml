---
# The container image used for MON/MGR/MDS/OSD/crash/ceph-exporter comes
# from container_images.ceph in group_vars/all.yml. Monitoring images
# (prometheus, grafana, alertmanager, node_exporter) come from the matching
# keys in container_images. Paths are relative to sources.container_registry
# — the same path works for connected (registry.redhat.io) and airgapped
# (builder's local registry) modes, because builder_registry mirrors them
# under the same path.

# Whether cephadm bootstrap enables the dashboard MGR module. On by
# default — SAs expect a management UI beyond the Grafana dashboards
# cephadm auto-provisions (Grafana is view-only; the native dashboard
# handles pool creation, OSD operations, CephFS management, etc.).
#
# When true, cephadm auto-generates an admin password and prints it to
# the bootstrap log + saves it under
# /var/lib/ceph/<fsid>/dashboard-password on the bootstrap node.
# Operators typically reset it to a known value immediately:
#   echo '<your-password>' | ceph dashboard ac-user-create admin -i - administrator
# The URL lands at https://<active-mgr-storage-ip>:8443 — reach it via
# SSH port-forward in labs where the storage network is L2-only.
ceph_bootstrap_enable_dashboard: true

# How long to wait for the newly-bootstrapped MON to reach at least
# HEALTH_WARN (HEALTH_OK won't happen until OSDs are added — that's
# ceph_expand's job).
ceph_bootstrap_mon_health_timeout_s: 120

# Max time for `cephadm bootstrap` itself to run before we consider it stuck.
ceph_bootstrap_cmd_timeout_s: 600

# Address the Ceph dashboard MGR module binds to. Default 0.0.0.0 binds all
# interfaces so the operator's mgmt-VLAN laptop can reach it (default binds
# only to the active MGR's storage IP, unreachable from mgmt). Set to a
# specific IP if you want to restrict the dashboard to one network.
ceph_bootstrap_dashboard_server_addr: "0.0.0.0"
