---
- name: "Preflight — time sync + this node's storage IP"
  ansible.builtin.import_tasks: preflight.yml
  tags: [ceph, ceph-bootstrap, ceph-preflight]

- name: "Install cephadm"
  ansible.builtin.import_tasks: packages.yml
  tags: [ceph, ceph-bootstrap, ceph-packages]

- name: "cephadm bootstrap"
  ansible.builtin.import_tasks: bootstrap.yml
  tags: [ceph, ceph-bootstrap]

- name: "Set public_network + cluster_network + dashboard server_addr post-bootstrap"
  ansible.builtin.import_tasks: network_config.yml
  tags: [ceph, ceph-bootstrap, ceph-network-config]

- name: "Point cephadm at local-registry copies of monitoring images"
  ansible.builtin.import_tasks: monitoring_config.yml
  tags: [ceph, ceph-bootstrap, ceph-monitoring]

- name: "Capture FSID + wait for initial MON health"
  ansible.builtin.import_tasks: verify.yml
  tags: [ceph, ceph-bootstrap, ceph-verify]
