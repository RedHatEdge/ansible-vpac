---
# Post-bootstrap network and dashboard binding. cephadm bootstrap's
# --public-network flag is unsupported in current versions and the
# --cluster-network flag is treated as a hint; both must be set
# authoritatively via `ceph config set global` after bootstrap. Without
# explicit public_network, cephadm infers it from --mon-ip, which on
# multi-NIC nodes can pick the wrong subnet and direct client-facing
# Ceph traffic over the operator's mgmt interface.
#
# Dashboard server_addr defaults to the active MGR's storage IP, which is
# unreachable from the operator's mgmt-VLAN laptop. Binding to 0.0.0.0
# makes it reachable everywhere; restrict via firewalld if needed.

- name: "Set ceph public_network (storage subnet)"
  ansible.builtin.command:
    cmd: "/usr/bin/ceph config set global public_network {{ ceph.public_network }}"
  changed_when: true

- name: "Set ceph cluster_network"
  ansible.builtin.command:
    cmd: "/usr/bin/ceph config set global cluster_network {{ ceph.cluster_network }}"
  changed_when: true

- name: "Bind dashboard to {{ ceph_bootstrap_dashboard_server_addr }}"
  ansible.builtin.command:
    cmd: "/usr/bin/ceph config set mgr mgr/dashboard/server_addr {{ ceph_bootstrap_dashboard_server_addr }}"
  when: ceph_bootstrap_enable_dashboard | bool
  changed_when: true

- name: "Fail the active MGR so the dashboard rebinds"
  # `ceph orch restart mgr` refuses with EINVAL "No standby MGRs" when
  # there's only the bootstrap MGR (always true on a fresh cluster, before
  # ceph_expand brings the others in). `ceph mgr fail` works on a single
  # MGR — it forces a respawn that re-reads the dashboard config we just
  # set. After ceph_expand adds standby MGRs, both options work; this
  # form keeps the bootstrap path single-step and idempotent.
  ansible.builtin.command:
    cmd: "/usr/bin/ceph mgr fail"
  when: ceph_bootstrap_enable_dashboard | bool
  changed_when: true
  register: _ceph_mgr_restart
