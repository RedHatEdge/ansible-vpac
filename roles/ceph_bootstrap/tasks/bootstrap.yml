---
- name: "Check for existing cluster (idempotency)"
  ansible.builtin.stat:
    path: /etc/ceph/ceph.conf
  register: _ceph_conf

- name: "Compute default container image from release"
  ansible.builtin.set_fact:
    _ceph_image: >-
      {{ ceph.container_image
         if (ceph.container_image | default('', true) | length > 0)
         else (sources.container_registry ~ '/ceph/ceph:' ~ ceph_release_tag_map[ceph.release]) }}

- name: "Run cephadm bootstrap (first run only)"
  # Pin cephadm to the target image before calling bootstrap — otherwise
  # cephadm picks its own default, which may drift from ceph.release.
  # --allow-fqdn-hostname: cephadm defaults to rejecting FQDN hostnames;
  # vPAC nodes intentionally have FQDNs (set by host_baseline).
  ansible.builtin.command:
    argv:
      - /usr/sbin/cephadm
      - --image
      - "{{ _ceph_image }}"
      - bootstrap
      - --mon-ip
      - "{{ _ceph_node.storage_ip }}"
      - --cluster-network
      - "{{ ceph.cluster_network }}"
      - --allow-fqdn-hostname
      - "{{ '--skip-dashboard' if not ceph_bootstrap_enable_dashboard else '' }}"
  register: _ceph_bootstrap
  when: not _ceph_conf.stat.exists
  async: "{{ ceph_bootstrap_cmd_timeout_s }}"
  poll: 15
