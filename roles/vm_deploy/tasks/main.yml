---
# Two operational modes:
#
#   STANDALONE: each VM is a plain libvirt domain on its target_host.
#               No failover. Appropriate for single-node deployments
#               and bring-up before pacemaker_base/stonith land.
#
#   MANAGED:    each VM is wrapped as a Pacemaker VirtualDomain resource
#               with location constraints from vm_catalog[].target_host
#               + allowed_hosts. Pacemaker auto-failovers on node loss.
#               Default when len(vpac_nodes) >= 3 AND stonith.enabled.
#
# Per-VM override at vm_catalog[].pacemaker_managed (true | false) takes
# precedence over the cluster-wide vm_deploy_managed_mode default.

- name: "Resolve cluster-wide managed mode for this play"
  ansible.builtin.set_fact:
    _vm_deploy_managed_mode_resolved: "{{ vm_deploy_managed_mode | bool }}"
  run_once: true

- name: "Managed-mode precheck: stonith-enabled=true on the cluster"
  ansible.builtin.import_tasks: managed_precheck.yml
  when: _vm_deploy_managed_mode_resolved | bool
  tags: [vm, vm-deploy, vm-deploy-managed-precheck]

- name: "Managed-mode helpers: drop /usr/local/sbin/pcs-vm-{move,status}"
  ansible.builtin.import_tasks: managed_helpers.yml
  when: _vm_deploy_managed_mode_resolved | bool
  tags: [vm, vm-deploy, vm-deploy-managed-helpers]

- name: "Loop over vm_catalog (per-VM dispatcher chooses standalone or managed)"
  ansible.builtin.include_tasks: deploy_one.yml
  loop: "{{ vm_catalog | default([]) }}"
  loop_control:
    loop_var: _vm
    label: "{{ _vm.name }} (target={{ _vm.target_host | default('none') }})"
