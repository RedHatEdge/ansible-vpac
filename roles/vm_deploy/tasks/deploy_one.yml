---
# Per-VM dispatcher. Resolves the per-VM managed flag (catalog override
# wins over cluster-wide default) and routes to the right path.

- name: "Resolve managed flag for this VM"
  ansible.builtin.set_fact:
    _vm_managed: "{{ _vm.pacemaker_managed | default(_vm_deploy_managed_mode_resolved) | bool }}"

- name: "Standalone path"
  ansible.builtin.import_tasks: standalone.yml
  when:
    - not _vm_managed
    - _vm.target_host | default('') == inventory_hostname

- name: "Managed path"
  ansible.builtin.import_tasks: managed.yml
  when: _vm_managed
