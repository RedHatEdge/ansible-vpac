---
# Atomic enable: only flip stonith-enabled=true after EVERY expected
# fence device is registered. A partial state with stonith-enabled=true
# but missing devices blocks all VirtualDomain resources cluster-wide
# (Pacemaker won't start a resource that requires fencing if it can't
# verify the fence path).

- name: "Read registered stonith devices"
  # `stonith_admin --list-registered` is per-node-aware — the local node
  # won't list its own fence device because of the "avoids self"
  # location constraint added earlier. `pcs stonith status` reads the
  # cluster-wide CIB and lists every fence resource regardless of where
  # it can run, which is the correct view for the registration check.
  ansible.builtin.command:
    cmd: pcs stonith status
  delegate_to: "{{ vpac_nodes[0].hostname }}"
  run_once: true
  register: _st_registered
  changed_when: false

- name: "Assert every expected fence-<hostname> is registered"
  ansible.builtin.assert:
    that: ('fence-' + item.hostname) in _st_registered.stdout
    fail_msg: >-
      Expected fence device fence-{{ item.hostname }} not found in
      `pcs stonith status` output. Refusing to flip stonith-enabled=true
      while devices are missing.
  loop: "{{ vpac_nodes }}"
  loop_control:
    label: "{{ item.hostname }}"
  delegate_to: "{{ vpac_nodes[0].hostname }}"
  run_once: true

- name: "pcs property set stonith-enabled=true"
  ansible.builtin.command:
    cmd: pcs property set stonith-enabled=true
  delegate_to: "{{ vpac_nodes[0].hostname }}"
  run_once: true
  changed_when: true
