---
# Every cluster node needs:
#   - podman (cephadm manages daemons as containers on each node; check-host
#     fails without it)
#   - ceph-common (for CephFS kernel mount + any cluster-side ceph commands)
# Both come from rhceph-{release}-tools-for-rhel-9, the RHCS entitled repo
# that host_baseline must have enabled (via rhsm.repos for connected mode
# or via the local_mirror template for airgapped).

- name: "Install podman + ceph-common from RHCS tools repo"
  # Runs before the trust drop-in below: podman pulls containers-common,
  # which is what creates /etc/containers/registries.conf.d/. On a fresh
  # RHEL minimal install that directory does not exist yet.
  ansible.builtin.dnf:
    name:
      - podman
      - ceph-common
    state: present

- name: "Trust the configured container registry (insecure/HTTP)"
  # Non-bootstrap nodes also pull the ceph container image for their
  # MON/MGR/MDS/OSD daemons. When the builder's insecure registry is in
  # use, write the same trust drop-in cluster-wide.
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf.d/99-vpac-local.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [[registry]]
      location = "{{ sources.container_registry }}"
      insecure = true
  when: sources.container_registry_insecure | default(false) | bool
