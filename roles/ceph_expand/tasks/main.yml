---
- name: "Load FSID and ceph.conf on the bootstrap node"
  ansible.builtin.import_tasks: load_facts.yml
  tags: [ceph, ceph-expand, ceph-facts]

- name: "Install podman + ceph-common on every cluster node"
  ansible.builtin.import_tasks: client_packages.yml
  tags: [ceph, ceph-expand, ceph-packages]

- name: "Authorize cephadm SSH key on every cluster node"
  ansible.builtin.import_tasks: authorize_cephadm.yml
  tags: [ceph, ceph-expand, ceph-hosts]

- name: "Add cluster hosts to the orchestrator"
  ansible.builtin.import_tasks: add_hosts.yml
  tags: [ceph, ceph-expand, ceph-hosts]

- name: "Add OSDs from inventory"
  ansible.builtin.import_tasks: add_osds.yml
  tags: [ceph, ceph-expand, ceph-osds]

- name: "Create RBD pools + enable rbd application + rbd pool init"
  ansible.builtin.import_tasks: rbd_pools.yml
  tags: [ceph, ceph-expand, ceph-rbd-pools]

- name: "Create CephFS pools + filesystem"
  ansible.builtin.import_tasks: cephfs.yml
  tags: [ceph, ceph-expand, ceph-fs]

- name: "Mount CephFS on every cluster node"
  ansible.builtin.import_tasks: mount.yml
  tags: [ceph, ceph-expand, ceph-mount]

- name: "Define libvirt cephx secret on every cluster node"
  ansible.builtin.import_tasks: libvirt_secret.yml
  tags: [ceph, ceph-expand, ceph-libvirt-secret]

- name: "Sanlock Ceph-side chain (lockspace + qemu-sanlock.conf + systemd oneshot)"
  ansible.builtin.import_tasks: sanlock_ceph.yml
  tags: [ceph, ceph-expand, ceph-sanlock]

- name: "Deploy monitoring stack (prometheus + alertmanager + grafana + node-exporter)"
  ansible.builtin.import_tasks: monitoring_deploy.yml
  tags: [ceph, ceph-expand, ceph-monitoring]

- name: "Verify final health"
  ansible.builtin.import_tasks: verify.yml
  tags: [ceph, ceph-expand, ceph-verify]
