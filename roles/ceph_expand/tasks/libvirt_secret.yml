---
# Create the cephx user libvirt uses to attach RBD volumes, then define a
# libvirt secret on every cluster node holding that user's key.
#
# The libvirt secret UUID MUST be the same on every node — different UUIDs
# silently break live migration (destination has no matching secret).
# Generate once with `uuidgen`, commit to inventory, never change.
#
# Skipped entirely when no RBD pool is declared in ceph.pools[].

- name: "Find RBD pool definitions"
  ansible.builtin.set_fact:
    _ceph_rbd_pools: "{{ ceph.pools | selectattr('type', 'equalto', 'rbd') | list }}"
  run_once: true

- name: "Skip libvirt secret setup when no RBD pools are declared"
  ansible.builtin.meta: end_play
  when: _ceph_rbd_pools | length == 0

- name: "Refuse to use the placeholder libvirt-secret UUID"
  ansible.builtin.assert:
    that: ceph.libvirt_secret_uuid != "00000000-0000-0000-0000-000000000000"
    fail_msg: >-
      ceph.libvirt_secret_uuid is the placeholder all-zeros UUID. Generate
      a site-unique value with `uuidgen` and set it in your inventory. The
      same UUID must be used on every cluster node, so commit it once and
      never change.
  run_once: true

- name: "Create or get cephx user for libvirt RBD access"
  ansible.builtin.command: >-
    /usr/bin/ceph auth get-or-create {{ ceph.libvirt_cephx_user }}
    mon "profile rbd"
    osd "profile rbd pool={{ _ceph_rbd_pools | first | attr('name') }}"
  delegate_to: "{{ ceph.bootstrap_node }}"
  run_once: true
  register: _ceph_libvirt_user
  changed_when: "'created' in (_ceph_libvirt_user.stderr | default('') | lower)"

- name: "Read cephx key for the libvirt user"
  ansible.builtin.command: "/usr/bin/ceph auth print-key {{ ceph.libvirt_cephx_user }}"
  delegate_to: "{{ ceph.bootstrap_node }}"
  run_once: true
  register: _ceph_libvirt_key
  changed_when: false
  no_log: true

- name: "Ensure libvirt secrets directory exists"
  ansible.builtin.file:
    path: /etc/libvirt/secrets
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: "Render libvirt secret XML"
  ansible.builtin.copy:
    dest: "/etc/libvirt/secrets/{{ ceph.libvirt_secret_uuid }}.xml"
    owner: root
    group: root
    mode: "0600"
    content: |
      <secret ephemeral='no' private='no'>
        <uuid>{{ ceph.libvirt_secret_uuid }}</uuid>
        <usage type='ceph'>
          <name>{{ ceph.libvirt_cephx_user }} secret</name>
        </usage>
      </secret>

- name: "Define libvirt secret (idempotent)"
  ansible.builtin.command: >-
    /usr/bin/virsh secret-define
    /etc/libvirt/secrets/{{ ceph.libvirt_secret_uuid }}.xml
  register: _ceph_secret_define
  changed_when: _ceph_secret_define.rc == 0
  failed_when:
    - _ceph_secret_define.rc != 0
    - "'already exists' not in (_ceph_secret_define.stderr | default(''))"
    - "'already defined' not in (_ceph_secret_define.stderr | default(''))"

- name: "Stage cephx key for virsh secret-set-value"
  ansible.builtin.copy:
    dest: /root/.vpac-cephx-key.tmp
    content: "{{ _ceph_libvirt_key.stdout | trim }}"
    owner: root
    group: root
    mode: "0400"
  no_log: true

- name: "Set libvirt secret value from staged key"
  ansible.builtin.command: >-
    /usr/bin/virsh secret-set-value
    --secret {{ ceph.libvirt_secret_uuid }}
    --file /root/.vpac-cephx-key.tmp
    --base64
  no_log: true
  changed_when: true

- name: "Shred and remove staged key file"
  ansible.builtin.command: /usr/bin/shred -u /root/.vpac-cephx-key.tmp
  changed_when: true
