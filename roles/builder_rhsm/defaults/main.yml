---
# This role reads the following from group_vars/all.yml (or vault.yml):
#   rhsm_activation_key + rhsm_org_id   — preferred, matches production
#   rhsm_username + rhsm_password       — fallback for SAs using a dev account
#   rhsm_server_url                     — defaults to subscription.rhsm.redhat.com
#   rhsm_repos                          — list of repo IDs to enable
#
# No role-local defaults; all values come from the site inventory so the
# builder-bootstrap path and the cluster path share one contract.

# When true, treat the host as already registered and only ensure repos
# are enabled. Useful for re-runs and for pre-registered Satellite hosts.
builder_rhsm_skip_register: false
