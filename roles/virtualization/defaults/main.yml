---
# Packages needed for KVM virtualization + tuned base profiles. RT-specific
# packages (kernel-rt, tuned-profiles-realtime, tuned-profiles-nfv-host) land
# in the rt_tuning role to keep concerns separated — those come from the
# rhel-9-for-x86_64-nfv-rpms repo, which the rt_tuning role enables.
#   swtpm-tools     TPM state init for Windows-11 / TPM-required guests
#   intel-cmt-cat   `pqos` for cache monitoring + partitioning (Intel CAT)
#   virt-viewer     operator console
#   cabextract      vendor SW bundle extraction (e.g. SSC600 .cab files)
#   cockpit-machines Cockpit's VM management panel
virtualization_packages:
  - libvirt
  - libvirt-client
  - qemu-kvm
  - qemu-img
  - virt-install
  - virt-viewer
  - swtpm
  - swtpm-tools
  - edk2-ovmf
  - intel-cmt-cat
  - cabextract
  - cockpit-machines
  - tuned
  - tuned-profiles-cpu-partitioning

# Tuned profile by host role. Everyone gets `virtual-host` out of the box.
# The rt_tuning role (stage 50) installs the RT-specific tuned profiles
# and swaps hosts in the rt_hosts group to `realtime-virtual-host`.
virtualization_tuned_profile_rt: "virtual-host"
virtualization_tuned_profile_nonrt: "virtual-host"

# Reboot after tuned changes the kernel cmdline. Production deploys leave
# this false and reboot nodes on a controlled schedule; labs and CI may
# set it true to drive the role unattended.
virtualization_auto_reboot: false

# Remove libvirt's built-in default NAT network. By default this only fires
# on airgapped deployments; connected sites keep the default NAT active so
# Windows installer workflows (`virt-install --network default`) work without
# operator footwork. Override to true/false explicitly to force.
virtualization_remove_default_network: "{{ (deployment_mode | default('connected')) == 'airgapped' }}"

# Define libvirt virtual networks (forward=bridge) for each VM-facing host
# bridge. The network NAME is what VM XMLs reference (`<source network='X'/>`);
# the bridge attribute is the host bridge to attach to. station-bus matches
# the established production convention used by vendor VM XMLs (SSC600 etc.).
virtualization_libvirt_networks:
  - name: br-mgmt
    bridge: "{{ bridges.mgmt }}"
  - name: station-bus
    bridge: "{{ bridges.station }}"

# Disable services that wake periodically and steal RT jitter:
# irqbalance, ksm, ksmtuned. Default true on every cluster node — none are
# useful for vPAC workloads. Toggle off only if a specific site has a reason.
virtualization_disable_jitter_services: true

# Sanlock host-side: install packages + add qemu to sanlock group + flip
# the SELinux boolean. The full sanlock-on-RBD activation chain (lockspace
# image, qemu-sanlock.conf with host_id, rbdmap, systemd oneshot) is
# completed by ceph_expand — this just primes the host so libvirtd can
# enable sanlock once that chain is in place.
virtualization_install_sanlock_host: true

# Lock manager set in /etc/libvirt/qemu.conf via in-place blockinfile.
# Default "none" — single-node labs and pre-Ceph runs work without locks.
# Flip to "sanlock" AFTER ceph_expand has provisioned the lockspace + per-node
# host_id; otherwise libvirt refuses to start any VM. When set back to "none"
# the managed block is removed.
virtualization_lock_manager: "none"

# QEMU hook: VM-name patterns whose vhost-net + kvm-pit threads should be
# pinned to the emulator core set and raised to SCHED_FIFO. Empty list
# leaves the hook installed but a no-op (safe default for non-vendor VMs).
# Patterns are bash globs, e.g. ["ssc600*", "vpr*", "win-server*"].
virtualization_qemu_hook_vm_patterns: []
virtualization_qemu_hook_vhost_priority: 1
virtualization_qemu_hook_kvm_pit_priority: 1

# Write the kvm_intel + vhost_net modprobe drop-in. Required for RT-VM
# determinism: PLE disabled, Intel APICv disabled, vhost zero-copy on.
# Auto-skipped on non-Intel CPUs (the role logs a note that AMD hosts
# need an equivalent kvm_amd drop-in, which is out of scope for v1).
# Triggers `dracut -f` so the options land in initramfs; takes effect
# at next reboot. See tasks/modprobe.yml for the values and rationale.
virtualization_write_modprobe: true
