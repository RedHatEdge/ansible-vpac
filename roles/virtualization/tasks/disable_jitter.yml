---
# Disable services that wake periodically and steal jitter from RT VMs even
# when individual VMs set <nosharepages/> or pin their CPUs:
#   irqbalance — silently fights `isolate_managed_irq=Y` by re-balancing
#                IRQs onto isolated cores
#   ksm        — same-page-merging scanner (CPU work)
#   ksmtuned   — tunes ksm aggressiveness; same problem
#
# Safe to run on non-RT hosts too — none are useful for cluster-node
# workloads. Skipped silently if the unit isn't installed.

- name: "Stop and disable jitter-causing services"
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - irqbalance
    - ksm
    - ksmtuned
  failed_when: false
  register: _virt_jitter

# tuned-ppd (the desktop power-slider shim) silently flips the tuned
# profile back to `balanced` when a GUI stack is present — observed on a
# field host installed "Server with GUI" (RH KB 7127032). Minimal installs
# don't carry it, so this is a no-op there. Mask rather than just disable
# so a later GUI package install cannot re-enable it.
- name: "Mask tuned-ppd (GUI power-slider daemon) if present"
  ansible.builtin.systemd_service:
    name: tuned-ppd
    state: stopped
    enabled: false
    masked: true
  failed_when: false
