---
# Example inventory for a 3-node vPAC cluster.
# Copy this entire inventory/example/ directory to inventory/<your-site>/
# and edit hosts.yml, group_vars/all.yml, and host_vars/*.yml.
#
# Placeholders used below:
#   site1-node-a/b/c  — replace with your actual hostnames (FQDN recommended)
#   10.0.0.0/24       — replace with your management subnet

all:
  children:

    # The builder host. Receives 01-build-builder.yml (standalone entry
    # point) — RHSM registration, RPM reposync, local container registry,
    # and (in a follow-up) installer-ISO minting. NOT part of vpac_cluster;
    # site.yml does not target it.
    builder:
      hosts:
        site1-builder:

    # All cluster nodes — receives host_baseline, networking, virtualization,
    # PTP, RT tuning, Ceph, Pacemaker.
    vpac_cluster:
      hosts:
        site1-node-a:
        site1-node-b:
        site1-node-c:

    # Nodes that carry relay/real-time VMs. In the field deployment reference design,
    # Nodes A and B host the RT workloads; Node C is reserved for Windows
    # engineering workstations with NIC passthrough (e.g. Wireshark).
    # Adjust to your deployment.
    rt_hosts:
      hosts:
        site1-node-a:
        site1-node-b:

    # Nodes that host the Windows engineering VM with passthrough.
    # Typically one node only.
    windows_hosts:
      hosts:
        site1-node-c:

    # Ceph-specific grouping. All three nodes run MON+MGR+OSD in the reference
    # design. Override here if you want dedicated mon-only nodes.
    ceph_nodes:
      hosts:
        site1-node-a:
        site1-node-b:
        site1-node-c:

    # First node runs cephadm bootstrap. The others join.
    ceph_bootstrap_node:
      hosts:
        site1-node-a:

    # Pacemaker / Corosync members. Normally identical to vpac_cluster.
    pacemaker_cluster:
      hosts:
        site1-node-a:
        site1-node-b:
        site1-node-c:

  hosts:
    # Per-node connection info. Use management IPs here (not storage or
    # station-bus IPs). Deploy user must have passwordless sudo.
    site1-builder:
      ansible_host: 10.0.0.10
      ansible_user: admin
    site1-node-a:
      ansible_host: 10.0.0.11
      ansible_user: admin
    site1-node-b:
      ansible_host: 10.0.0.12
      ansible_user: admin
    site1-node-c:
      ansible_host: 10.0.0.13
      ansible_user: admin
