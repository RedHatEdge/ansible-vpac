---
# ====================================================================
# vPAC cluster — site variables (EDIT THIS FILE FOR YOUR DEPLOYMENT)
# ====================================================================
#
# This file is the contract between you and the playbooks. Every value
# a role needs at runtime is declared here with an example. If a playbook
# references a variable that is not in this file, that is a bug — please
# file an issue.
#
# Fill in the values below, then run:
#   ansible-playbook -i inventory/<your-site> site.yml --tags preflight
# to validate your settings before committing to a full deploy.

# --------------------------------------------------------------------
# 1. Site identity
# --------------------------------------------------------------------
site_name: "site1"                       # short identifier, used in logs/prompts
site_domain: "example.utility.local"     # DNS domain for cluster nodes
site_timezone: "America/Phoenix"         # IANA tz
site_dns_servers:
  - 10.0.0.1
  - 10.0.0.2

# --------------------------------------------------------------------
# 2. Deployment mode
# --------------------------------------------------------------------
# Two first-class paths:
#   connected — nodes have outbound internet; install RHEL yourself or by any
#               standard method; site.yml pulls from RHSM and registry.redhat.io.
#   airgapped — utility POC / substation default; run 01-build-builder.yml
#               first to prepare a local mirror + registry on the builder;
#               (and then mint the cluster-node installer ISO with the
#               tooling container — see docs/IMAGE-BUILDER.md);
#               site.yml pulls from the builder you operate.
#
# Each of the two deployment guides under docs/ walks through the full workflow
# for its path. This variable selects defaults for everything in section 3;
# override individual entries there to mix (e.g. Satellite RPMs + registry.redhat.io
# images) when egress is selective.
deployment_mode: "connected"             # connected | airgapped

# --------------------------------------------------------------------
# 3. Sources (where packages, images, and collections come from)
# --------------------------------------------------------------------
# Every role that fetches an RPM, pulls a container image, or installs an
# Ansible collection reads from this subtree. No role hardcodes a URL or
# registry. Defaults are picked by deployment_mode; override below if needed.
sources:

  # RPM source. rhsm = Red Hat Subscription Manager CDN; satellite = your
  # Satellite/capsule; local_mirror = a local reposync'd mirror (air-gapped).
  repo_source: "rhsm"                    # rhsm | satellite | local_mirror

  # Required when repo_source == satellite
  satellite_url: ""                      # e.g. https://satellite.example.local

  # Required when repo_source == local_mirror
  local_mirror_url: ""                   # e.g. http://builder.example.local/mirror

  # Container registry for Red Hat Ceph Storage (and any other pulled
  # images). registry.redhat.io for connected deployments; a local
  # registry hostname for air-gapped. The builder_registry role mirrors
  # RHCS images under the same path ("rhceph/rhceph-7-rhel9:latest"), so
  # flipping this variable is the only change required between modes.
  container_registry: "registry.redhat.io"   # e.g. site1-builder:5000

  # Set true when container_registry is a plain-HTTP registry (the
  # builder_registry role's podman-hosted registry:2 on port 5000 is
  # plain HTTP by default). Writes an insecure trust drop-in on every
  # cluster node. Always false for registry.redhat.io.
  container_registry_insecure: false

  # Where the Ansible control node pulls collection dependencies. galaxy for
  # connected, local_tarball for air-gapped (tarball produced by the builder).
  ansible_collections_source: "galaxy"   # galaxy | local_tarball
  ansible_collections_local_path: ""     # e.g. /opt/ansible-collections.tar.gz

# --------------------------------------------------------------------
# 4. RHEL subscription + container registry auth
# --------------------------------------------------------------------
# RHSM credentials for the builder (01-build-builder.yml) and the cluster
# nodes (site.yml, when sources.repo_source is rhsm). Use vault.yml for
# the secrets — never commit plaintext.
rhsm_activation_key: "{{ vault_rhsm_activation_key | default('') }}"
rhsm_org_id: "{{ vault_rhsm_org_id | default('') }}"
rhsm_server_url: "subscription.rhsm.redhat.com"

# Subscription model: this contract assumes Simple Content Access (SCA),
# which is the default on Red Hat accounts created since ~2022. With SCA
# on, registering with the activation key above is enough — every repo
# in rhsm_repos lights up immediately, no per-host pool attach needed.
#
# If your account is NOT on SCA (legacy attach-a-pool model), set
# rhsm_pool to the pool ID covering RHEL + HA + Resilient Storage + NFV
# + Ceph Storage 7. host_baseline (repo_rhsm.yml) and builder_rhsm both
# pass it to community.general.redhat_subscription as the pool to attach.
# To check which model your account uses, log in to console.redhat.com
# → Subscriptions → "Simple Content Access" status banner.
rhsm_pool: ""

# Optional: enrol cluster nodes with Red Hat Insights via `rhc connect`
# (host_baseline). When true, hosts appear in console.redhat.com with
# advisor/vulnerability/compliance data. Reuses the activation key + org
# above. Only takes effect when sources.repo_source is "rhsm" — air-gapped
# and satellite-only sites cannot reach console.redhat.com so the role
# auto-skips this even if the toggle is on.
host_baseline_enable_insights: false

# Repos enabled on the builder (by builder_rhsm) AND on cluster nodes (by
# host_baseline, when sources.repo_source is rhsm). The builder reposyncs
# this entire list into its local mirror so the same contract works for
# air-gapped and connected deployments.
#   baseos / appstream       — RHEL core
#   highavailability         — pcs, pacemaker, corosync, fence-agents
#   resilient-storage        — gfs2 + companion bits
#   nfv                      — kernel-rt, tuned-profiles-nfv, realtime
#   rhceph-7-tools           — cephadm, ceph-common (Red Hat Ceph Storage 7)
rhsm_repos:
  - rhel-9-for-x86_64-baseos-rpms
  - rhel-9-for-x86_64-appstream-rpms
  - rhel-9-for-x86_64-highavailability-rpms
  - rhel-9-for-x86_64-resilient-storage-rpms
  - rhel-9-for-x86_64-nfv-rpms
  - rhceph-7-tools-for-rhel-9-x86_64-rpms

# Red Hat container registry credentials. Required for builder_registry
# to skopeo-copy RHCS + monitoring images from registry.redhat.io. Create
# a *registry* service account at
#   https://access.redhat.com/terms-based-registry/
# and put the username + password in vault.yml.
#   Username shape: "<org-id>|<token-name>"
#   Password:       long random string
# (Not to be confused with the IAM/API service accounts at
# console.redhat.com/iam — those authenticate to hybrid-cloud-console
# APIs, not to registry.redhat.io.)
redhat_registry_url: "registry.redhat.io"
redhat_registry_username: "{{ vault_redhat_registry_username | default('') }}"
redhat_registry_password: "{{ vault_redhat_registry_password | default('') }}"

# Red Hat container images the stack pulls, keyed by role.
#   - builder_registry mirrors every value here from redhat_registry_url
#     into the local registry.
#   - ceph_bootstrap passes container_images.ceph to cephadm for MON/MGR/
#     MDS/OSD/crash/ceph-exporter, and sets the per-daemon cephadm config
#     (mgr/cephadm/container_image_{prometheus,alertmanager,
#     node_exporter,grafana}) to point at the local registry copies.
# Paths are relative to the registry host — the role prepends
# sources.container_registry when pulling.
# Versions: bump when RHCS releases new compatible tags. The defaults
# below track the images shipped with RHCS 7.1.
container_images:
  ceph:           "rhceph/rhceph-7-rhel9:latest"
  prometheus:     "openshift4/ose-prometheus:v4.15"
  alertmanager:   "openshift4/ose-prometheus-alertmanager:v4.15"
  node_exporter: "openshift4/ose-prometheus-node-exporter:v4.15"
  grafana:        "rhceph/grafana-rhel9:latest"

# --------------------------------------------------------------------
# 5. Node topology
# --------------------------------------------------------------------
# One entry per cluster node. hostname must match inventory/hosts.yml.
# Interface names can also be overridden per-node in host_vars/<node>.yml
# (recommended when nodes are not hardware-identical).
vpac_nodes:
  - hostname: "site1-node-a"
    mgmt_ip: "10.0.0.11"                 # management network (Ansible reachability)
    storage_ip: "10.0.10.11"             # Ceph public + cluster network
    station_ip: "10.0.20.11"             # station bus (IEC 61850 traffic)
    heartbeat_ip: "10.0.30.11"           # dedicated corosync/pacemaker network
    bmc_ip: "10.0.100.11"                # iDRAC/IPMI for STONITH
    bmc_type: "idrac9"                   # idrac9 | idrac8 | supermicro_ipmi | generic_ipmilan
    bmc_user: "admin"
    bmc_password: "{{ vault_bmc_password_node_a }}"  # use ansible-vault
  - hostname: "site1-node-b"
    mgmt_ip: "10.0.0.12"
    storage_ip: "10.0.10.12"
    station_ip: "10.0.20.12"
    heartbeat_ip: "10.0.30.12"
    bmc_ip: "10.0.100.12"
    bmc_type: "idrac9"
    bmc_user: "admin"
    bmc_password: "{{ vault_bmc_password_node_b }}"
  - hostname: "site1-node-c"
    mgmt_ip: "10.0.0.13"
    storage_ip: "10.0.10.13"
    station_ip: "10.0.20.13"
    heartbeat_ip: "10.0.30.13"
    bmc_ip: "10.0.100.13"
    bmc_type: "supermicro_ipmi"
    bmc_user: "admin"
    bmc_password: "{{ vault_bmc_password_node_c }}"

# --------------------------------------------------------------------
# 6. Networking
# --------------------------------------------------------------------
# The playbooks assume five logical networks. They MAY share physical NICs
# via VLANs, but some combinations are hazardous (see below). Defaults are
# dedicated NICs where it matters.

networks:

  # Management: Ansible reachability, sysadmin SSH, libvirt mgmt
  mgmt:
    cidr: "10.0.0.0/24"
    gateway: "10.0.0.1"
    vlan: null                           # null = untagged, otherwise integer VLAN ID

  # Storage: Ceph public + cluster network. Dedicated bond recommended.
  storage:
    cidr: "10.0.10.0/24"
    gateway: null                        # typically no gateway (L2-only)
    vlan: 10

  # Station bus: IEC 61850 GOOSE/SV, relay-to-process traffic. Often L2 trunk.
  station:
    cidr: "10.0.20.0/24"
    gateway: null
    vlan: 20

  # Cluster heartbeat: corosync ring, separate from VM mgmt bridge.
  # DO NOT collapse this onto mgmt if mgmt also hosts VM libvirt networks —
  # bridge churn from guest VMs will starve corosync heartbeats.
  heartbeat:
    cidr: "10.0.30.0/24"
    gateway: null
    vlan: 30

  # BMC / IPMI: usually a separate physical network, accessed by STONITH agent.
  bmc:
    cidr: "10.0.100.0/24"
    gateway: "10.0.100.1"
    vlan: null

# Per-host physical layout. Override in host_vars/<node>.yml when a node
# doesn't match the default hardware.
networking_defaults:

  # The NIC dedicated to PTP. MUST NOT be a bridge member, bond slave, or
  # macvtap target. Verified by the ptp_isolation role.
  ptp_nic: "ens4f2"

  # Bond for management bridge.
  # active-backup: primary= names the preferred member; failover happens on
  # carrier loss only when miimon polls (here 100 ms). Without miimon, the
  # kernel uses ARP probes — much slower failure detection.
  mgmt_bond:
    name: "bond0"
    mode: "active-backup"
    members: ["eno1", "eno2"]
    options:
      miimon: 100
      primary: "eno1"

  # Bond for storage (no bridge — raw IP on the bond).
  # 802.3ad (LACP): xmit_hash_policy=layer3+4 spreads flows across links
  # by IP+port (best for many small Ceph connections). lacp_rate=fast
  # cuts failover from ~30s to ~3s.
  storage_bond:
    name: "bond1"
    mode: "802.3ad"                      # LACP when ToR supports it
    members: ["ens1f0", "ens1f1"]
    options:
      miimon: 100
      xmit_hash_policy: "layer3+4"
      lacp_rate: "fast"

  # Bond for station bus bridge.
  station_bond:
    name: "bond2"
    mode: "active-backup"
    members: ["ens2f0", "ens2f1"]
    options:
      miimon: 100
      primary: "ens2f0"

  # Dedicated NIC for cluster heartbeat — NOT a bridge member
  heartbeat_nic: "ens3f0"

# Bridge names presented to VMs. station-nic matches the established
# production convention (vendor VM XMLs and the libvirt `station-bus`
# network reference this name). Override only if you have a documented
# reason to differ.
bridges:
  mgmt: "br-mgmt"
  station: "station-nic"

# --------------------------------------------------------------------
# 7. Time sync (chrony + PTP)
# --------------------------------------------------------------------
# Two-layer design:
#   1. host_baseline (stage 10) configures chrony with ntp_servers below
#      and waits for sync. Clocks are in NTP tolerance (~10 ms) before any
#      later stage runs.
#   2. ptp_timesync (stage 40) installs linuxptp and, based on mode, either
#      strips NTP from chrony (mode=ptp) or keeps NTP as a fallback
#      (mode=ptp_with_ntp). Pure NTP sites (mode=ntp) skip the PTP part.
#
# Ceph (stage 60) asserts chrony is synchronized before `cephadm bootstrap`
# — belt-and-suspenders, independent of how sync was established.

time_sync:

  # How time reaches the cluster:
  #   ntp          — chrony with the ntp_servers list; no PTP
  #   ptp          — PTP is authoritative; NTP sources stripped after stage 40
  #   ptp_with_ntp — PTP preferred, NTP kept as a fallback (safer production)
  mode: "ptp"

  # NTP sources used initially by host_baseline, and retained when
  # mode is "ntp" or "ptp_with_ntp". When mode is "ptp", these are
  # used only for the initial sync then removed in stage 40.
  ntp_servers:
    - "0.rhel.pool.ntp.org"
    - "1.rhel.pool.ntp.org"
    - "2.rhel.pool.ntp.org"

  # How long host_baseline waits for chrony to report sync. Raise for
  # sites with slow / distant NTP or when bootstrapping off PTP alone.
  sync_timeout_s: 120
  max_offset_ms: 50

  # Intra-cluster chrony peer mesh on the storage network. Keeps the
  # cluster clock-consistent if upstream NTP becomes unreachable. Each
  # node peers with every other node's storage_ip; nodes also advertise
  # `local stratum 10` with `allow networks.storage.cidr`. Required for
  # Ceph clock-skew defense — leave true unless you have an external
  # site-wide PTP/NTP fabric every node also uses.
  intra_cluster_peer: true

  # PTP configuration — used by stage 40 (ptp_timesync).
  ptp:
    domain: 0
    transport: "L2"                      # L2 | UDPv4
    delay_mechanism: "P2P"               # P2P | E2E — relay domains usually P2P
    profile: "default"                   # default | G.8275.1 | G.8275.2

# --------------------------------------------------------------------
# 8. Real-time tuning
# --------------------------------------------------------------------
# Kernel cmdline knobs: isolcpus, hugepage size, nohz_full, rcu_nocbs.
# isolated_cpus is a string passed to isolcpus= and nohz_full=.
# Compute this from the RT VM layout — isolate the CPUs the VMs will pin to.
rt_tuning:
  isolated_cpus: "4-11,28-35"
  hugepage_size: "1G"                    # 1G | 2M
  # nr_hugepages is computed by the virtualization role from the VM catalog
  # unless overridden here. If set, must satisfy:
  #   nr_hugepages * hugepage_size_bytes <= 0.9 * node_ram_bytes
  nr_hugepages_override: null
  cpu_governor: "performance"
  sched_rt_runtime_us: -1                # -1 disables throttling for RT tasks

# RT chrony overrides applied ONLY on hosts in the rt_hosts group.
# Values come from vendor (ABB) guidance for relay timing.
rt_chrony:
  lock_all: true
  sched_priority: 60
  combinelimit: 0

# --------------------------------------------------------------------
# 9. Ceph (Red Hat Ceph Storage)
# --------------------------------------------------------------------
# FSID is generated by cephadm bootstrap on first run and captured into
# a fact; leave null unless you are re-deploying onto an existing cluster.
#
# Container image defaults to
#   "{{ sources.container_registry }}/{{ container_images.ceph }}"
# Override ceph.container_image to pin a specific digest, or edit
# container_images.ceph to change the tag.
#
# Registry auth: registry.redhat.io requires authentication. Create a
# ceph-registry credentials JSON at a local path on the bootstrap node:
#   {"url":"registry.redhat.io","username":"<sa-user>","password":"<sa-token>"}
# Then set ceph.registry_credentials_file: "/root/ceph-registry.json".
# Leave null for anonymous local registries (the builder's registry on :5000).
ceph:
  fsid: null
  public_network: "10.0.10.0/24"         # must match networks.storage.cidr
  cluster_network: "10.0.10.0/24"        # typically same subnet as public
  release: "7"                           # RHCS major version (7, 6, …)
  container_image: null                  # null → derived from sources.container_registry + release
  registry_credentials_file: null        # path on bootstrap node; JSON for cephadm --registry-json
  bootstrap_node: "site1-node-a"

  # Per-node OSD devices. Must be empty block devices. No auto-discovery.
  osd_devices:
    site1-node-a:
      - "/dev/nvme0n1"
      - "/dev/nvme1n1"
      - "/dev/nvme2n1"
    site1-node-b:
      - "/dev/nvme0n1"
      - "/dev/nvme1n1"
      - "/dev/nvme2n1"
    site1-node-c:
      - "/dev/nvme0n1"
      - "/dev/nvme1n1"
      - "/dev/nvme2n1"

  pools:
    - name: "vms"
      type: "cephfs"
      data_pg_num: 128
      metadata_pg_num: 32

  cephfs_mountpoint: "/vms"

# --------------------------------------------------------------------
# 10. Pacemaker / Corosync
# --------------------------------------------------------------------
# Pacemaker + Corosync require at least 3 nodes. When len(vpac_nodes) < 3
# the pacemaker and stonith roles skip and VMs are defined as standalone
# libvirt domains on the single node.
pacemaker:
  cluster_name: "vpac-{{ site_name }}"

  # Corosync uses the heartbeat network ONLY. Not mgmt.
  transport: "knet"
  ring_interface: "{{ networks.heartbeat.cidr }}"

  # hacluster user password (for pcs auth). Use vault.
  hacluster_password: "{{ vault_hacluster_password }}"

  # Resource stickiness — higher = VMs tend to stay put
  default_resource_stickiness: 100

# --------------------------------------------------------------------
# 11. STONITH
# --------------------------------------------------------------------
# One entry per node. Devices are created with name "fence-<hostname>".
# Pre-requisite (real hardware): IPMI-over-LAN enabled in the BMC (BIOS/
# iDRAC setting). Preflight verifies reachability.
stonith:
  enabled: true

  # Fence agent. fence_ipmilan for real BMCs (iDRAC, Supermicro IPMI);
  # fence_virsh for libvirt-based test clusters where there is no BMC.
  fence_agent: "fence_ipmilan"           # fence_ipmilan | fence_virsh

  # fence_ipmilan defaults — override per-node via bmc_type on vpac_nodes
  default_lanplus: true
  default_cipher: 3
  default_delay: 0

  # Location constraints: each fence device avoids its own node (a node
  # can't fence itself). Role handles this automatically from vpac_nodes.

# --------------------------------------------------------------------
# 12. VM catalog
# --------------------------------------------------------------------
# The VMs to create on this cluster. Each entry references a profile
# under roles/vm_templates/vars/profiles/. Add new profiles for new
# relay or workstation types.

vm_catalog:

  # Example relay VM (ABB SSC600 pattern)
  - name: "ssc600-01"
    profile: "ssc600"
    target_host: "site1-node-a"          # null = let Pacemaker choose
    allowed_hosts: ["site1-node-a", "site1-node-b"]
    vcpus: 4
    pinned_cpus: [4, 5, 6, 7]
    emulator_cpus: [8, 9]
    memory_gb: 8
    hugepages: true
    rt_priority: 50
    preserve_mac: false
    nics:
      - bridge: "br-station"
        model: "virtio"
    disks:
      - source: "cephfs:/vms/ssc600-01.qcow2"
        size_gb: 40
        bus: "virtio"

  # Example VPR / RTAC VM
  - name: "vpr-01"
    profile: "vpr"
    target_host: "site1-node-b"
    allowed_hosts: ["site1-node-a", "site1-node-b"]
    vcpus: 2
    pinned_cpus: [10, 11]
    emulator_cpus: [2, 3]
    memory_gb: 2
    hugepages: true
    rt_priority: 40
    preserve_mac: true
    mac_address: "52:54:00:00:00:01"
    nics:
      - bridge: "br-station"
        model: "virtio"
    disks:
      - source: "cephfs:/vms/vpr-01.qcow2"
        size_gb: 20
        bus: "virtio"

  # Example Windows engineering VM with passthrough
  - name: "winws-01"
    profile: "windows_passthrough"
    target_host: "site1-node-c"
    allowed_hosts: ["site1-node-c"]
    vcpus: 8
    memory_gb: 16
    hugepages: false                     # Windows does not need 1G pages here
    nics:
      - bridge: "br-mgmt"
        model: "virtio"
    pci_passthrough:
      - "0000:18:00.0"                   # example NIC for Wireshark
    disks:
      - source: "cephfs:/vms/winws-01.qcow2"
        size_gb: 120
        bus: "virtio"

# --------------------------------------------------------------------
# 13. Builder ISO minting (air-gapped path)
# --------------------------------------------------------------------
# Variables consumed by roles/builder_iso_mint via
# playbooks/00-mint-builder-iso.yml. Runs on the SA's workstation (any OS
# with podman or docker) and produces a bootable RHEL 9 installer ISO
# with a kickstart baked in that installs the builder unattended.
#
# Every value here has a sensible default in
# roles/builder_iso_mint/defaults/main.yml — only set here what needs
# overriding for your site.
#
# Cluster-node ISO minting (per-node installers) uses the same tooling
# container and is slated for a follow-up commit — see docs/IMAGE-BUILDER.md.

# Path on the SA's workstation to the stock RHEL 9.x DVD ISO downloaded
# from access.redhat.com. Must be the full DVD (~13 GB), not the
# boot-only ISO — the minted installer needs every package offline.
builder_iso_input: "~/Downloads/rhel-9.7-x86_64-dvd.iso"

# Where the minted ISO lands. Repo-local build/ by default.
builder_iso_output: "{{ playbook_dir }}/../build/vpac-builder-installer.iso"

# Target disk for the builder's OS install:
#   sda     — typical BIOS/UEFI servers with SATA/SAS
#   vda     — virtio disks on KVM/libvirt VMs
#   nvme0n1 — servers with NVMe OS disks
builder_iso_os_disk: "sda"

# SSH public key authorized on the minted builder for the admin user.
builder_iso_ssh_pubkey_path: "~/.ssh/id_ed25519.pub"

# Optional sha512crypt hash for the admin user's password (console
# login). Empty string = SSH-key-only (locked password). Generate with:
#   python3 -c "import crypt; print(crypt.crypt('mypass', crypt.mksalt(crypt.METHOD_SHA512)))"
builder_iso_admin_password_hash: ""

# Container CLI to use on your workstation. Set to "docker" if you use
# Docker Desktop (macOS/Windows).
builder_iso_container_cli: "podman"

# ----- cluster-node ISO minting (playbooks/00b-mint-cluster-isos.yml) -----
# Produces one installer ISO per entry in vpac_nodes, each with that
# node's mgmt_ip + hostname baked in. Same tooling container as the
# builder ISO (cached between runs).

# Reuses the same source DVD as the builder ISO; point both at your
# downloaded RHEL 9 DVD.
cluster_iso_input: "~/Downloads/rhel-9.7-x86_64-dvd.iso"

# Directory where per-node ISOs land. One file named
# vpac-node-<hostname>.iso per vpac_nodes entry.
#
# WARNING: each ISO is ~13 GB. A 3-node cluster produces ~39 GB.
# Do NOT point this at a tmpfs (e.g. /tmp on Fedora/Bazzite) — you'll
# run out of RAM mid-mint.
cluster_iso_output_dir: "{{ playbook_dir }}/../build"

# OS install disk for every cluster node. Same override story as
# builder_iso_os_disk. The kickstart uses `ignoredisk --only-use=<this>`
# so every OSD device stays intact for Ceph to format later.
cluster_iso_os_disk: "sda"

# Admin user + SSH key. Should match the ansible_user in
# inventory/<site>/hosts.yml for cluster nodes.
cluster_iso_admin_user: "admin"
cluster_iso_ssh_pubkey_path: "~/.ssh/id_ed25519.pub"
cluster_iso_admin_password_hash: ""

# --------------------------------------------------------------------
# 14. Validation thresholds
# --------------------------------------------------------------------
validate:
  cyclictest_duration_s: 300
  cyclictest_max_latency_us: 120         # alert if tail > this on RT hosts
  ptp_max_offset_ns: 1000
  ceph_require_health_ok: true
