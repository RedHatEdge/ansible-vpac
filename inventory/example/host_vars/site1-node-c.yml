---
# Per-node overrides for Node C. See site1-node-a.yml for format.
#
# In the blueprint pattern all three nodes are identical — same hardware,
# same kernel-rt, same dedicated PTP NIC, same Ceph + Pacemaker
# membership. Workload placement preferences (e.g. a VM that needs a
# specific PCI device pinned to the node where that device lives) belong
# in vm_catalog[].target_host + allowed_hosts, NOT as per-node hardware
# overrides here.
#
# Use this file for genuine per-host hardware variance only — for
# example, if a single node has a different PCI slot map and needs an
# overridden ptp_nic name. Edge case; most deployments leave this file
# empty.
