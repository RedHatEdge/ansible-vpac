# Variables for the realtime-virtual-host tuned profile.
#
# isolated_cores is an EXAMPLE — adjust to YOUR CPU topology. It must agree with
# the isolcpus/nohz_full/rcu_nocbs range baked in
# /usr/lib/bootc/kargs.d/10-vpac-rt.toml, the relay VM's vcpupin/emulatorpin,
# and the cyclictest validation range.
#
# In this image mode the kernel command line is owned by kargs.d, so the cores
# listed here drive only tuned's non-cmdline tunings; keep the two in sync.
isolated_cores=10-15

# Keep isolated CPUs out of the managed IRQ set so device interrupts do not land
# on the guest's cores.
isolate_managed_irq=Y
